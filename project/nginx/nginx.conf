server {
    listen 80;

    # Статика — React SPA
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # API — Backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Prometheus метрики
    location /metrics {
        proxy_pass http://backend:8000/metrics;
    }
}
